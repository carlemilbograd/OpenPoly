name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-cov requests python-dotenv py_clob_client web3

      - name: Run tests
        run: pytest tests/ -v --tb=long --cov=scripts --cov-report=term-missing

      - name: Check for syntax errors in scripts
        run: find scripts -name '*.py' | xargs python -m py_compile
